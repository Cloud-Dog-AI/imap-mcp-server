services:
  api:
    build:
      context: .
      network: host
    image: cloud-dog/imap-mcp-server:latest
    container_name: imap-mcp-api
    command: api
    network_mode: host
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      - CLOUD_DOG__API_SERVER__PORT=${CLOUD_DOG__API_SERVER__PORT}
      - IMAP_API_KEY=${IMAP_API_KEY:-test-api-key}
      - VAULT_ADDR=${VAULT_ADDR:-}
      - VAULT_TOKEN=${VAULT_TOKEN:-}
      - VAULT_MOUNT_POINT=${VAULT_MOUNT_POINT:-}
      - VAULT_CONFIG_PATH=${VAULT_CONFIG_PATH:-}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./certs:/app/certs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS \"http://127.0.0.1:${CLOUD_DOG__API_SERVER__PORT}/health\" >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  web:
    build:
      context: .
      network: host
    image: cloud-dog/imap-mcp-server:latest
    container_name: imap-mcp-web
    command: web
    network_mode: host
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      - CLOUD_DOG__WEB_SERVER__PORT=${CLOUD_DOG__WEB_SERVER__PORT}
      - CLOUD_DOG__API_SERVER__PORT=${CLOUD_DOG__API_SERVER__PORT}
      - CLOUD_DOG__MCP_SERVER__PORT=${CLOUD_DOG__MCP_SERVER__PORT}
      - CLOUD_DOG__A2A_SERVER__PORT=${CLOUD_DOG__A2A_SERVER__PORT}
      - IMAP_API_KEY=${IMAP_API_KEY:-test-api-key}
      - VAULT_ADDR=${VAULT_ADDR:-}
      - VAULT_TOKEN=${VAULT_TOKEN:-}
      - VAULT_MOUNT_POINT=${VAULT_MOUNT_POINT:-}
      - VAULT_CONFIG_PATH=${VAULT_CONFIG_PATH:-}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./certs:/app/certs
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS \"http://127.0.0.1:${CLOUD_DOG__WEB_SERVER__PORT}/\" >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  mcp:
    build:
      context: .
      network: host
    image: cloud-dog/imap-mcp-server:latest
    container_name: imap-mcp-mcp
    command: mcp
    network_mode: host
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      - CLOUD_DOG__MCP_SERVER__PORT=${CLOUD_DOG__MCP_SERVER__PORT}
      - IMAP_API_KEY=${IMAP_API_KEY:-test-api-key}
      - VAULT_ADDR=${VAULT_ADDR:-}
      - VAULT_TOKEN=${VAULT_TOKEN:-}
      - VAULT_MOUNT_POINT=${VAULT_MOUNT_POINT:-}
      - VAULT_CONFIG_PATH=${VAULT_CONFIG_PATH:-}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./certs:/app/certs
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS \"http://127.0.0.1:${CLOUD_DOG__MCP_SERVER__PORT}/mcp\" >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  a2a:
    build:
      context: .
      network: host
    image: cloud-dog/imap-mcp-server:latest
    container_name: imap-mcp-a2a
    command: a2a
    network_mode: host
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      - CLOUD_DOG__A2A_SERVER__PORT=${CLOUD_DOG__A2A_SERVER__PORT}
      - IMAP_API_KEY=${IMAP_API_KEY:-test-api-key}
      - TEST_A2A_API_KEY=${TEST_A2A_API_KEY:-test-api-key}
      - VAULT_ADDR=${VAULT_ADDR:-}
      - VAULT_TOKEN=${VAULT_TOKEN:-}
      - VAULT_MOUNT_POINT=${VAULT_MOUNT_POINT:-}
      - VAULT_CONFIG_PATH=${VAULT_CONFIG_PATH:-}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./certs:/app/certs
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS \"http://127.0.0.1:${CLOUD_DOG__A2A_SERVER__PORT}/a2a/health\" >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # All-in-one (development only)
  all-in-one:
    build:
      context: .
      network: host
    image: cloud-dog/imap-mcp-server:latest
    container_name: imap-mcp-all
    command: all
    network_mode: host
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      - CLOUD_DOG__API_SERVER__PORT=${CLOUD_DOG__API_SERVER__PORT}
      - CLOUD_DOG__WEB_SERVER__PORT=${CLOUD_DOG__WEB_SERVER__PORT}
      - CLOUD_DOG__MCP_SERVER__PORT=${CLOUD_DOG__MCP_SERVER__PORT}
      - CLOUD_DOG__A2A_SERVER__PORT=${CLOUD_DOG__A2A_SERVER__PORT}
      - IMAP_API_KEY=${IMAP_API_KEY:-test-api-key}
      - TEST_A2A_API_KEY=${TEST_A2A_API_KEY:-test-api-key}
      - VAULT_ADDR=${VAULT_ADDR:-}
      - VAULT_TOKEN=${VAULT_TOKEN:-}
      - VAULT_MOUNT_POINT=${VAULT_MOUNT_POINT:-}
      - VAULT_CONFIG_PATH=${VAULT_CONFIG_PATH:-}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./certs:/app/certs
    profiles:
      - all-in-one
    restart: unless-stopped
