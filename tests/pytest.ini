; template-id: T-PYI
; template-version: 1.0
; applies-to: tests/pytest.ini
; required: must-have
; extends-via: PS-REQ-TEST-TRACE v1.0 §6.1
;
; Copy this file to <project>/tests/pytest.ini. Do not edit marker names; add
; project-specific markers under the "project-specific" section if needed.

[pytest]
addopts = -ra --strict-markers --strict-config
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

; Canonical markers — PS-REQ-TEST-TRACE §6.1
markers =
    ; Tiers (RULES.md §5.1)
    QT: Quick test — lint, format, type check (no real systems)
    UT: Unit test — isolated function/class (mocks allowed)
    ST: System test — local real services
    IT: Integration test — real running servers + backends
    AT: Acceptance test — full end-to-end against real systems

    ; Surfaces (PS-REQ-TEST-TRACE §3 + §6.1)
    api: REST API surface
    mcp: MCP JSON-RPC tools surface
    a2a: Agent-to-Agent surface
    webui: Browser-driven WebUI surface
    cli: Command-line surface
    internal: Internal-only (not user-facing)

    ; Traits
    negative: Negative / refused-flow test (links to a CS-NNN)
    probe: Smoke / probe test (exempt from req() requirement)
    slow: Long-running test (excluded from default fast runs)
    llm: Test requires a live LLM endpoint
    external: Test requires a live external service (mail server, VDB, etc.)
    flaky: Known-flaky (track in TEST-STATUS.md known-issue column)

    ; Requirement linkage — PS-REQ-TEST-TRACE §6
    req(*ids): Bind the test to one or more REQ-IDs (FR-NNN / CS-NNN). Variadic.

; Project-specific markers (additive only)
;   <add lines here, e.g.:>
;   project-specific-marker: description
